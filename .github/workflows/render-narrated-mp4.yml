name: Render narrated MP4
on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Sync Drive Videos
    types:
      - completed
  push:
    paths:
      - assets/originals/**
      - assets/demo-narration.mp3
      - videos.config.js
      - scripts/sync_drive_videos.sh
      - scripts/render_narrated_movie.sh
permissions:
  contents: write
jobs:
  render:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: bash scripts/sync_drive_videos.sh
      - run: bash scripts/render_narrated_movie.sh
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/rendered/airline-logistics-ai-demo-narrated.mp4
          git diff --cached --quiet || git commit -m "chore: render narrated mp4" && git push || true
